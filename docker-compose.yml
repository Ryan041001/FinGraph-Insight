services:
  neo4j:
    image: neo4j:5
    container_name: fingraph-insight-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data

  backend:
    build: ./backend
    container_name: fingraph-insight-backend
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      SCHEDULER_ENABLED: "true"
    depends_on:
      - neo4j

  frontend:
    build: ./frontend
    container_name: fingraph-insight-frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  neo4j_data:
