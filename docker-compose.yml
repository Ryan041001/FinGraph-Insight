services:
  neo4j:
    image: neo4j:5
    container_name: fingraph-insight-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data

  backend:
    build: ./backend
    container_name: fingraph-insight-backend
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_FALLBACK_BASE_URLS: ${OPENAI_FALLBACK_BASE_URLS:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_FALLBACK_MODELS: ${LLM_FALLBACK_MODELS:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
      LLM_TEXT2CYPHER_TIMEOUT_SECONDS: ${LLM_TEXT2CYPHER_TIMEOUT_SECONDS:-45}
      LLM_NEWS_TIMEOUT_SECONDS: ${LLM_NEWS_TIMEOUT_SECONDS:-90}
      LLM_STREAM_TIMEOUT_SECONDS: ${LLM_STREAM_TIMEOUT_SECONDS:-120}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-1}
      LLM_RETRY_BACKOFF_SECONDS: ${LLM_RETRY_BACKOFF_SECONDS:-0.2}
      LLM_CIRCUIT_BREAKER_FAILURES: ${LLM_CIRCUIT_BREAKER_FAILURES:-3}
      LLM_CIRCUIT_BREAKER_COOLDOWN_SECONDS: ${LLM_CIRCUIT_BREAKER_COOLDOWN_SECONDS:-30}
      SCHEDULER_ENABLED: "true"
      GRAPH_BACKEND: neo4j
      STARTUP_PRELOAD_DATASET: "true"
      STARTUP_REFRESH_AKSHARE: ${STARTUP_REFRESH_AKSHARE:-false}
    volumes:
      - ./data:/app/data:ro
    depends_on:
      - neo4j

  frontend:
    build: ./frontend
    container_name: fingraph-insight-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  neo4j_data:
