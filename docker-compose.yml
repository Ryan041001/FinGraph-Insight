services:
  neo4j:
    image: neo4j:5
    container_name: fingraph-insight-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      # Performance tuning for graph operations
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2g
      NEO4J_dbms_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fingraph-insight-backend
    ports:
      - "8000:8000"
    environment:
      # Neo4j connection
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password

      # LLM configuration
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_FALLBACK_BASE_URLS: ${OPENAI_FALLBACK_BASE_URLS:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_FALLBACK_MODELS: ${LLM_FALLBACK_MODELS:-}

      # LLM timeouts
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
      LLM_TEXT2CYPHER_TIMEOUT_SECONDS: ${LLM_TEXT2CYPHER_TIMEOUT_SECONDS:-45}
      LLM_NEWS_TIMEOUT_SECONDS: ${LLM_NEWS_TIMEOUT_SECONDS:-90}
      LLM_STREAM_TIMEOUT_SECONDS: ${LLM_STREAM_TIMEOUT_SECONDS:-120}

      # LLM retry and circuit breaker
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-1}
      LLM_RETRY_BACKOFF_SECONDS: ${LLM_RETRY_BACKOFF_SECONDS:-0.2}
      LLM_CIRCUIT_BREAKER_FAILURES: ${LLM_CIRCUIT_BREAKER_FAILURES:-3}
      LLM_CIRCUIT_BREAKER_COOLDOWN_SECONDS: ${LLM_CIRCUIT_BREAKER_COOLDOWN_SECONDS:-30}

      # Application settings
      SCHEDULER_ENABLED: "true"
      GRAPH_BACKEND: neo4j
      STARTUP_PRELOAD_DATASET: "true"
      STARTUP_REFRESH_AKSHARE: ${STARTUP_REFRESH_AKSHARE:-false}
    volumes:
      - ./data:/app/data:ro
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fingraph-insight-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  neo4j_data:
    driver: local
